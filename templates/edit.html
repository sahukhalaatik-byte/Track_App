<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction</title>
</head>
<body>

<h1>Edit Transaction</h1>

<form action="/edit/{{ trn['id'] }}" method="POST">

    <label for="title">Title</label>
    <input type="text" id="title" name="title" value="{{ trn['title'] }}" required>

    <label for="amount">Amount (Rs)</label>
    <input type="number" id="amount" name="amount" step="0.01" min="0.01" value="{{ trn['amount'] }}" required>

    <label for="type">Type</label>
    <select id="type" name="type" required>
        <option value="income"  {% if trn['type'] == 'income'  %}selected{% endif %}>Income</option>
        <option value="expense" {% if trn['type'] == 'expense' %}selected{% endif %}>Expense</option>
    </select>

    <label for="category">Category</label>
    <select id="category" name="category">
        <option {% if trn['category'] == 'Food'    %}selected{% endif %}>Food</option>
        <option {% if trn['category'] == 'Bill'    %}selected{% endif %}>Bill</option>
        <option {% if trn['category'] == 'Salary'  %}selected{% endif %}>Salary</option>
        <option {% if trn['category'] == 'Others'  %}selected{% endif %}>Others</option>
    </select>

    <label for="date">Date</label>
    <input type="date" id="date" name="date" value="{{ trn['date'] }}" required>

    <label for="notes">Notes (Optional)</label>
    <textarea id="notes" name="notes">{{ trn['notes'] }}</textarea>

    <button type="submit">Save Changes</button>
    <a href="{{ url_for('index') }}">Cancel</a>

</form>

</body>
</html>
